<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adriana's Grand Prix 🏁</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://birthday-6795f-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const guestsRef = ref(db, 'guests');

        window.sendRSVP = function() {
            const nameInput = document.getElementById('guestName');
            const name = nameInput.value.trim();
            
            if (name) {
                push(guestsRef, {
                    name: name,
                    timestamp: Date.now()
                }).then(() => {
                    nameInput.value = '';
                }).catch((error) => {
                    alert("שגיאה ברישום: " + error.message);
                });
            }
        };

        onValue(guestsRef, (snapshot) => {
            const guestListElement = document.getElementById('guestList');
            guestListElement.innerHTML = '';
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).forEach(guest => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span>🏎️ ${guest.name}</span>`;
                    guestListElement.appendChild(li);
                });
            }
        });
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://i.pinimg.com/1200x/69/ef/10/69ef10391be55dd02e4ec2c446360148.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
        }

        h1 { font-size: 2.2rem; margin: 0; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); font-weight: 900; }
        .sub-title { color: #e10600; font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; }

        .info-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
            border-right: 4px solid #e10600;
            text-align: right;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
        }

        button {
            width: 100%;
            padding: 15px;
            background: #e10600;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(225, 6, 0, 0.4);
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        .guest-list-section {
            margin-top: 25px;
            text-align: right;
        }

        .list-header {
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
            margin-bottom: 10px;
            display: block;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            max-height: 180px; 
            overflow-y: auto; 
        }

        li {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e10600; border-radius: 10px; }
    </style>
</head>
<body>

<div class="glass-card">
    <h1>ADRIANA 21</h1>
    <div class="sub-title">JERUSALEM GRAND PRIX</div>

    <div class="info-box">
        📍 <strong>מקום:</strong> קארטינג ירושלים<br>
        📅 <strong>יום:</strong> רביעי הקרוב<br>
        ⏰ <strong>שעה:</strong> 18:00
    </div>

    <div id="formContainer">
        <input type="text" id="guestName" placeholder="איך קוראים לך?" required>
        <button onclick="sendRSVP()">אשר הגעה למרוץ 🏁</button>
    </div>

    <div class="guest-list-section">
        <span class="list-header">נהגים שכבר נרשמו:</span>
        <ul id="guestList">
            </ul>
    </div>
</div>

</body>
</html>
