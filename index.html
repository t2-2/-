// ── BOOT ────────────────────────────────────────────────────────────────
async function seedAgent(id) {
  const ref  = doc(db,'agents',id);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, { ...AGENTS[id], agentId:id, salary: AGENTS[id].baseSalary });
  }
  // seed bank
  const bref  = doc(db,'banks',id);
  const bsnap = await getDoc(bref);
  if (!bsnap.exists()) {
    await setDoc(bref, { balance:70e15, agentId:id });
  }
  // seed tohu
  const tref  = doc(db,'system','tohu');
  const tsnap = await getDoc(tref);
  if (!tsnap.exists()) {
    await setDoc(tref,{active:false,level:0,activatedBy:null,activatedAt:null});
  }
}

// ── LOGIN ────────────────────────────────────────────────────────────────
window.doLogin = async function() {
  const id  = document.getElementById('loginId').value.trim();
  const btn = document.getElementById('loginBtn');
  if (!AGENTS[id]) { showErr('// מספר סוכן לא מזוהה — גישה נדחית'); return; }
  btn.disabled = true;
  await seedAgent(id);
  const snap = await getDoc(doc(db,'agents',id));
  agent = { ...AGENTS[id], ...snap.data(), agentId:id };
  await boot();
  startDashboard();
};

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

async function boot() {
  const lines = [
    `INITIALIZING GIZBALLAH SECURE PORTAL v3.1`,
    `AGENT: ${agent.agentId} — ${agent.codename}`,
    `CLEARANCE: ${agent.rank} [${agent.rankCode}]`,
    `LOADING ENCRYPTED MODULES...`,
    `BIOMETRIC VERIFY: OK`,
    `ACCESS GRANTED`,
  ];
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('bootWrap').style.display='flex';
  const el = document.getElementById('bootLines');
  el.textContent='';
  for (const l of lines) { await sleep(240); el.textContent += '> '+l+'\n'; }
  await sleep(500);
  document.getElementById('bootWrap').style.display='none';
}

function startDashboard() {
  document.getElementById('dashboard').style.display='flex';
  // Header
  document.getElementById('hdrEmoji').textContent = agent.emoji;
  document.getElementById('hdrName').textContent  = agent.codename;
  document.getElementById('hdrRank').textContent  = agent.rank;
  document.getElementById('hdrId').textContent    = agent.agentId;

  // Show/hide tabs based on rank
  const isPresident = agent.rankCode==='PRESIDENT';
  const isCommander = RANK_ORDER.indexOf(agent.rankCode) >= RANK_ORDER.indexOf('ALG');
  if (isPresident) document.getElementById('tabTohu').style.display='flex';
  if (isPresident) document.getElementById('tabCouncil').style.display='flex';
  if (isPresident) document.getElementById('tabGpass').style.display='flex';
  if (isCommander) document.getElementById('tabTasks').style.display='flex';

  // Subscriptions
  subBank();
  subTohu();
  subAlerts();
  if (isCommander) subTasks();
  else subMyTasks();

  switchTab('bank');
}

// ── BANK ─────────────────────────────────────────────────────────────────
function subBank() {
  if (bankSub) bankSub();
  bankSub = onSnapshot(doc(db,'banks',agent.agentId), snap => {
    bankData = snap.data();
    renderBank();
  });
}

async function renderBank() {
  const txSnap = await getDocs(query(
    collection(db,'banks',agent.agentId,'transactions'),
    orderBy('createdAt','desc')
  ));
  const txs = txSnap.docs.map(d=>({id:d.id,...d.data()}));
  const balance = bankData?.balance ?? 0;

  // Get salary from agent doc
  const agSnap = await getDoc(doc(db,'agents',agent.agentId));
  const salary = agSnap.data()?.salary ?? agent.baseSalary;

  document.getElementById('bankContent').innerHTML = `
    <div class="bank-hero">
      <div class="bank-balance-label">יתרת חשבון</div>
      <div class="bank-balance">${fmtBTC(balance)}</div>
      <div class="bank-salary-row">
        <span class="bank-salary-label">משכורת חודשית</span>
        <span class="bank-salary-val">${fmtBTC(salary)}</span>
      </div>
    </div>
    ${agent.rankCode==='PRESIDENT' ? presidentBankControls() : ''}
    <div class="tx-section">
      <div class="section-label">עובר ושב</div>
      ${txs.length ? txs.map(tx=>`
        <div class="tx-row">
          <div class="tx-info">
            <div class="tx-desc">${esc(tx.description||'')}</div>
            <div class="tx-date">${tx.createdAt?fmtDate(tx.createdAt.toDate()):'—'}</div>
          </div>
          <div class="tx-amount ${tx.amount>=0?'tx-in':'tx-out'}">${tx.amount>=0?'+':''}${fmtBTC(tx.amount)}</div>
        </div>`).join('') : '<div class="empty">אין פעולות עדיין</div>'}
    </div>`;

  if (agent.rankCode==='PRESIDENT') bindPresidentBank();
}

function presidentBankControls() {
  const opts = Object.entries(AGENTS).map(([id,a])=>
    `<option value="${id}">${a.emoji} ${a.codename}</option>`).join('');
  return `
    <div class="ctrl-card">
      <div class="ctrl-title">ניהול פיננסי — נשיא</div>
      <div class="ctrl-row">
        <select class="inp-select" id="fineTarget">${opts}</select>
        <input type="number" class="inp-text" id="fineAmount" placeholder="סכום קנס (BTC)">
        <button class="btn btn-danger" id="fineBtn">הפעל קנס</button>
      </div>
      <div class="ctrl-row">
        <select class="inp-select" id="salTarget">${opts}</select>
        <input type="number" class="inp-text" id="salAmount" placeholder="משכורת חדשה">
        <button class="btn btn-primary" id="salBtn">עדכן משכורת</button>
      </div>
      <div class="ctrl-row">
        <button class="btn btn-secondary" id="paydayBtn" style="width:100%">💰 שלם משכורות לכולם</button>
      </div>
    </div>`;
}

function bindPresidentBank() {
  document.getElementById('fineBtn')?.addEventListener('click', async () => {
    const tgt = document.getElementById('fineTarget').value;
    const amt = parseFloat(document.getElementById('fineAmount').value);
    if (!tgt||isNaN(amt)||amt<=0) return notify('ערך לא תקין','error');
    await chargeAgent(tgt, -amt, `קנס מהנשיא`);
    notify(`קנס הופחת מ-${AGENTS[tgt].codename}`,'success');
  });
  document.getElementById('salBtn')?.addEventListener('click', async () => {
    const tgt = document.getElementById('salTarget').value;
    const amt = parseFloat(document.getElementById('salAmount').value);
    if (!tgt||isNaN(amt)) return notify('ערך לא תקין','error');
    await updateDoc(doc(db,'agents',tgt),{salary:amt});
    if (tgt===agent.agentId) agent.salary=amt;
    notify(`משכורת ${AGENTS[tgt].codename} עודכנה`,'success');
  });
  document.getElementById('paydayBtn')?.addEventListener('click', async () => {
    for (const [id] of Object.entries(AGENTS)) {
      const aSnap = await getDoc(doc(db,'agents',id));
      const sal = aSnap.data()?.salary ?? AGENTS[id].baseSalary;
      if (sal>0) await chargeAgent(id, sal, 'משכורת חודשית');
    }
    notify('משכורות שולמו לכולם','success');
  });
}

async function chargeAgent(agentId, amount, description) {
  await updateDoc(doc(db,'banks',agentId),{balance:increment(amount)});
  await addDoc(collection(db,'banks',agentId,'transactions'),{
    amount, description, createdAt:serverTimestamp()
  });
}

    <div class="item-desc">${item.desc}</div>

window.buyItem = async function(id, name, price) {
  const bSnap = await getDoc(doc(db,'banks',agent.agentId));
  const bal   = bSnap.data()?.balance ?? 0;
  if (bal < price) { notify('יתרה לא מספקת','error'); return; }
  await chargeAgent(agent.agentId, -price, `רכישה: ${name}`);
  notify(`${name} נרכש בהצלחה`,'success');
};

// ── ALERTS ─────────────────────────────────────────────────────────────
function subAlerts() {
  if (alertsSub) alertsSub();
  alertsSub = onSnapshot(
    query(collection(db,'alerts'), where('toId','==',agent.agentId), orderBy('createdAt','desc')),
    snap => {
      const alerts = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderAlerts(alerts);
      const unread = alerts.filter(a=>!a.read).length;
      document.getElementById('alertBadge').textContent = unread||'';
      document.getElementById('alertBadge').style.display = unread?'flex':'none';
    }
  );
}

function renderAlerts(alerts) {
  const myRankIdx = RANK_ORDER.indexOf(agent.rankCode);
  // Who can I alert? agents with LOWER rank than me
  const targets = Object.entries(AGENTS).filter(([id,a])=>
    RANK_ORDER.indexOf(a.rankCode) < myRankIdx && id !== agent.agentId
  );

  document.getElementById('alertsContent').innerHTML = `
    ${targets.length ? `
    <div class="ctrl-card">
      <div class="ctrl-title">שלח התראה</div>
      <div class="ctrl-col">
        <select class="inp-select" id="alertTarget">
          <option value="">— בחר סוכן —</option>
          ${targets.map(([id,a])=>`<option value="${id}">${a.emoji} ${a.codename} (${a.rank})</option>`).join('')}
        </select>
        <input type="text" class="inp-text" id="alertMsg" placeholder="תוכן ההתראה..." style="width:100%">
        <select class="inp-select" id="alertLevel">
          <option value="info">ℹ️ מידע</option>
          <option value="warning">⚠️ אזהרה</option>
          <option value="critical">🚨 קריטי</option>
        </select>
        <button class="btn btn-primary" onclick="sendAlert()">שלח התראה</button>
      </div>
    </div>` : ''}
    <div class="section-label">התראות שהתקבלו</div>
    ${alerts.length ? alerts.map(a=>`
      <div class="alert-card al-${a.level||'info'} ${a.read?'al-read':''}">
        <div class="al-header">
          <span class="al-from">${AGENTS[a.fromId]?.emoji||'?'} ${AGENTS[a.fromId]?.codename||a.fromId}</span>
          <span class="al-date">${a.createdAt?fmtDate(a.createdAt.toDate()):'—'}</span>
        </div>
        <div class="al-msg">${esc(a.message)}</div>
        ${!a.read?`<button class="btn btn-sm btn-ghost" onclick="markRead('${a.id}')">סמן כנקרא</button>`:''}
      </div>`).join('') : '<div class="empty">אין התראות</div>'}`;
}

window.sendAlert = async function() {
  const to  = document.getElementById('alertTarget').value;
  const msg = document.getElementById('alertMsg').value.trim();
  const lvl = document.getElementById('alertLevel').value;
  if (!to||!msg) { notify('מלא את כל השדות','error'); return; }
  await addDoc(collection(db,'alerts'),{
    toId:to, fromId:agent.agentId, message:msg, level:lvl,
    read:false, createdAt:serverTimestamp()
  });
  document.getElementById('alertMsg').value='';
  notify('התראה נשלחה','success');
};

window.markRead = async function(id) {
  await updateDoc(doc(db,'alerts',id),{read:true});
};

// ── TASKS ────────────────────────────────────────────────────────────────
function subTasks() {
  if (tasksSub) tasksSub();
  tasksSub = onSnapshot(query(collection(db,'tasks'),orderBy('createdAt','desc')), snap=>{
    renderTasksView(snap.docs.map(d=>({id:d.id,...d.data()})));
  });
}

function subMyTasks() {
  if (tasksSub) tasksSub();
  tasksSub = onSnapshot(
    query(collection(db,'tasks'),where('assigneeId','==',agent.agentId),orderBy('createdAt','desc')),
    snap=>renderTasksView(snap.docs.map(d=>({id:d.id,...d.data()})))
  );
}

function renderTasksView(tasks) {
  const isCommander = RANK_ORDER.indexOf(agent.rankCode) >= RANK_ORDER.indexOf('ALG');
  const agentOpts = Object.entries(AGENTS).map(([id,a])=>
    `<option value="${id}">${a.emoji} ${a.codename}</option>`).join('');

  document.getElementById('tasksContent').innerHTML = `
    ${isCommander ? `
    <div class="ctrl-card">
      <div class="ctrl-title">הוסף משימה</div>
      <div class="ctrl-col">
        <input type="text" class="inp-text" id="tTitle" placeholder="כותרת משימה" style="width:100%">
        <textarea class="inp-textarea" id="tDesc" placeholder="תיאור (אופציונלי)"></textarea>
        <div class="ctrl-row">
          <select class="inp-select" id="tAssignee"><option value="">— שייך לסוכן —</option>${agentOpts}</select>
          <select class="inp-select" id="tPriority">
            <option value="high">🔴 גבוהה</option>
            <option value="medium" selected>🟡 בינונית</option>
            <option value="low">🟢 נמוכה</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="addTask()">+ הוסף משימה</button>
      </div>
    </div>` : ''}
    <div class="section-label">משימות פעילות</div>
    <div class="tasks-grid">
    ${tasks.length ? tasks.map(t=>{
      const ass = AGENTS[t.assigneeId];
      const isMine = t.assigneeId===agent.agentId;
      return `<div class="task-card tc-${t.priority||'medium'} ${t.status==='done'?'tc-done':''}">
        <div class="tc-header">
          <span class="tc-badge tp-${t.priority||'medium'}">${t.priority==='high'?'HIGH':t.priority==='low'?'LOW':'MED'}</span>
          <span class="tc-id">${t.id.slice(-5).toUpperCase()}</span>
        </div>
        <div class="tc-title">${esc(t.title)}</div>
        ${t.description?`<div class="tc-desc">${esc(t.description)}</div>`:''}
        <div class="tc-footer">
          <span class="tc-ass">${ass?.emoji||'?'} ${ass?.codename||t.assigneeId}</span>
          <span class="tc-status ts-${t.status}">${t.status==='done'?'✓ הושלם':t.status==='in_progress'?'⟳ בביצוע':'○ ממתין'}</span>
        </div>
        <div class="tc-actions">
          ${isMine&&t.status!=='done'?`<button class="btn btn-sm btn-accent" onclick="doneTask('${t.id}')">✓ סיים</button>`:''}
          ${isCommander?`<button class="btn btn-sm btn-ghost btn-danger-h" onclick="delTask('${t.id}')">✕</button>`:''}
        </div>
      </div>`;
    }).join('') : '<div class="empty">אין משימות</div>'}
    </div>`;
}

window.addTask = async function() {
  const title    = document.getElementById('tTitle')?.value.trim();
  const desc     = document.getElementById('tDesc')?.value.trim();
  const assignee = document.getElementById('tAssignee')?.value;
  const priority = document.getElementById('tPriority')?.value;
  if (!title||!assignee) { notify('נא למלא כותרת וסוכן','error'); return; }
  await addDoc(collection(db,'tasks'),{
    title,description:desc,assigneeId:assignee,priority,
    status:'pending',createdBy:agent.agentId,createdAt:serverTimestamp()
  });
  notify('משימה נוספה','success');
};

window.doneTask  = async id => { await updateDoc(doc(db,'tasks',id),{status:'done'}); notify('משימה הושלמה','success'); };
window.delTask   = async id => { await deleteDoc(doc(db,'tasks',id)); notify('משימה נמחקה','info'); };

// ── TOHU ────────────────────────────────────────────────────────────────
function subTohu() {
  if (tohuSub) tohuSub();
  tohuSub = onSnapshot(doc(db,'system','tohu'), snap=>{
    tohuSt = snap.data();
    updateTohuBanner();
    if (activeTab==='tohu') renderTohu();
  });
}

function updateTohuBanner() {
  const bar = document.getElementById('tohuBar');
  if (!tohuSt?.active) { bar.style.display='none'; return; }
  const lvl = TOHU_LEVELS[tohuSt.level];
  bar.style.display='block';
  bar.style.background=lvl.hex+'22';
  bar.style.borderColor=lvl.hex;
  bar.style.color=lvl.hex;
  bar.textContent=`⚠ ${lvl.name} פעיל — ${lvl.desc}`;
}

let selTohu = null;
function renderTohu() {
  const active = tohuSt?.active;
  const lvl    = active ? TOHU_LEVELS[tohuSt.level] : null;
  document.getElementById('tohuContent').innerHTML = `
    <div class="tohu-wrap">
      ${active ? `
        <div class="tohu-active-card" style="border-color:${lvl.hex};background:${lvl.hex}11">
          <div class="ta-badge" style="background:${lvl.hex}">⚠</div>
          <div class="ta-title" style="color:${lvl.hex}">${lvl.name} פעיל</div>
          <div class="ta-desc">${lvl.desc}</div>
          <div class="ta-by">הופעל על ידי: ${tohuSt.activatedBy||'—'}</div>
          <button class="btn btn-ghost" onclick="deactivateTohu()" style="margin-top:12px">■ כבה קוד תוהו</button>
        </div>` : `
        <div class="tohu-idle">
          <div class="section-label">בחר רמת תוהו</div>
          <div class="tohu-grid">
            ${Object.entries(TOHU_LEVELS).map(([n,l])=>`
              <div class="tohu-card ${selTohu==n?'tc-sel':''}" data-lv="${n}"
                   style="--tc:${l.hex}" onclick="selectTohu(${n})">
                <div class="tc-num">${n}</div>
                <div class="tc-lname">${l.name}</div>
              </div>`).join('')}
          </div>
          <div class="tohu-desc" id="tohuDesc">
            ${selTohu ? `<span style="color:${TOHU_LEVELS[selTohu].hex};font-weight:600">${TOHU_LEVELS[selTohu].name}:</span> ${TOHU_LEVELS[selTohu].desc}` : 'בחר רמה לצפייה בהסבר'}
          </div>
          <button class="btn btn-danger btn-full" onclick="activateTohu()" ${!selTohu?'disabled':''}>▶ הפעל קוד תוהו</button>
        </div>`}
    </div>`;
}

window.selectTohu = function(n) {
  selTohu=n; renderTohu();
};
window.activateTohu = async function() {
  if (!selTohu||!confirm(`אשר הפעלת קוד תוהו ${selTohu}?`)) return;
  await updateDoc(doc(db,'system','tohu'),{active:true,level:selTohu,activatedBy:agent.codename,activatedAt:serverTimestamp()});
  selTohu=null; notify(`קוד תוהו ${selTohu||''}  הופעל`,'success');
};
window.deactivateTohu = async function() {
  if (!confirm('אשר כיבוי קוד תוהו?')) return;
  await updateDoc(doc(db,'system','tohu'),{active:false,level:0,activatedBy:null,activatedAt:null});
  notify('קוד תוהו כובה','info');
};

// ── FALCON COUNCIL (president only) ─────────────────────────────────────
function renderCouncil() {
  document.getElementById('councilContent').innerHTML = `
    <div class="council-header">
      <span class="council-emblem">🦅</span>
      <div>
        <div class="council-title">מועצת הנץ</div>

      </div>
    </div>
    <div class="council-body">
      <p>מועצת הנץ היא הגוף השיפוטי העליון של הגיזבאללה. כל דיון, פסיקה ועונש עוברים דרך הממשק המאובטח.</p>
      <a href="falcon_council.html" class="btn btn-primary" style="margin-top:16px;display:inline-block;text-decoration:none">
        פתח ממשק מועצת הנץ ←
      </a>
    </div>`;

// ── G-PASS ──────────────────────────────────────────────────────────────
async function renderGpass() {
  const snap = await getDocs(query(collection(db,'gpasses'),orderBy('createdAt','desc')));
  const passes = snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('gpassContent').innerHTML = `
    <div class="gpass-header">
      <div class="gpass-badge">G</div>
      <div>
        <div class="gpass-title">G-PASS — אישור בשם בולוק</div>
        <div class="gpass-sub">אישור מיוחד מוענק על ידי הנשיא בלבד</div>
      </div>
    </div>
    <div class="ctrl-card">
      <div class="ctrl-title">הנפק G-PASS חדש</div>
      <div class="ctrl-col">
        <input type="text" class="inp-text" id="gpName" placeholder="שם מקבל הפאס (שם / כינוי חופשי)" style="width:100%">
        <textarea class="inp-textarea" id="gpDedication" placeholder="הקדשה / מטרת האישור"></textarea>
        <button class="btn btn-primary" onclick="issueGpass()">הנפק G-PASS</button>
      </div>
    </div>
    <div class="section-label">פאסים פעילים</div>
    ${passes.length ? passes.map(p=>`
      <div class="gpass-card">
        <div class="gpass-card-header">
          <span class="gpass-card-id">G-PASS #${p.id.slice(-6).toUpperCase()}</span>
          <span class="gpass-card-date">${p.createdAt?fmtDate(p.createdAt.toDate()):'—'}</span>
        </div>
        <div class="gpass-card-name">מוענק ל: ${esc(p.recipientName)}</div>
        <div class="gpass-card-ded">${esc(p.dedication||'')}</div>
        <div class="gpass-card-footer">
          <span class="gpass-seal">בולוק — אושר</span>
          <button class="btn btn-sm btn-ghost btn-danger-h" onclick="revokeGpass('${p.id}')">בטל</button>
        </div>
      </div>`).join('') : '<div class="empty">אין G-PASSים פעילים</div>'}`;
}

window.issueGpass = async function() {
  const name = document.getElementById('gpName').value.trim();
  const ded  = document.getElementById('gpDedication').value.trim();
  if (!name) { notify('נא להזין שם','error'); return; }
  await addDoc(collection(db,'gpasses'),{
    recipientName:name, dedication:ded,
    issuedBy:agent.agentId, createdAt:serverTimestamp()
  });
  notify('G-PASS הונפק','success');
  renderGpass();
};

window.revokeGpass = async function(id) {
  if (!confirm('בטל את הפאס הזה?')) return;
  await deleteDoc(doc(db,'gpasses',id));
  notify('פאס בוטל','info');
  renderGpass();
};

// ── TAB SYSTEM ────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.style.display='none');
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  document.getElementById(`pane-${tab}`).style.display='block';
  // render on switch
  if (tab==='bank')    renderBank();
  if (tab==='shop')    renderShop();
  if (tab==='gizmed')  renderGizmed();
  if (tab==='alerts')  { /* live sub */ }
  if (tab==='tohu')    renderTohu();
  if (tab==='council') renderCouncil();
  if (tab==='gpass')   renderGpass();
};

window.logout = function() {
  agent=null;
  [alertsSub,tasksSub,tohuSub,bankSub].forEach(u=>u&&u());
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('loginId').value='';
};

// ── NOTIFY ────────────────────────────────────────────────────────────────
function notify(msg, type='info') {
  const el = document.getElementById('notify');
  el.textContent=msg;
  el.className='notify show n-'+type;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function fmtBTC(n) {
  const v=Number(n);
  if(v>=1e15) return (v/1e15).toFixed(2)+' Q BTC';
  if(v>=1e12) return (v/1e12).toFixed(2)+' T BTC';
  if(v>=1e9)  return (v/1e9).toFixed(2)+' B BTC';
  if(v>=1e6)  return (v/1e6).toFixed(2)+' M BTC';
  if(v<0) {
    const a=Math.abs(v);
    if(a>=1e15) return '-'+(a/1e15).toFixed(2)+' Q BTC';
    if(a>=1e12) return '-'+(a/1e12).toFixed(2)+' T BTC';
    if(a>=1e9)  return '-'+(a/1e9).toFixed(2)+' B BTC';
  }
  return v.toLocaleString()+' BTC';
}
function fmtDate(d) {
  return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginWrap').style.display!=='none') doLogin();
});
</script>

.bank-balance{font-size:1.8rem;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;line-height:1.2}
.bank-salary-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--b1)}
.bank-salary-label{font-size:0.62rem;color:var(--dim);letter-spacing:0.08em}
.bank-salary-val{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--acc2)}
.tx-section{margin-top:8px}
.tx-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--b1);
}
.tx-desc{font-size:0.8rem;color:var(--text)}
.tx-date{font-size:0.62rem;color:var(--dim);margin-top:2px}
.tx-amount{font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:600}
.tx-in{color:var(--green)}
.tx-out{color:var(--red)}

/* ── SHOP / GIZMED ──────────────────────────────────────────────────────── */
.shop-section{margin-bottom:20px}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.item-card{
  background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);
  padding:14px;display:flex;flex-direction:column;align-items:center;
  gap:6px;text-align:center;transition:border-color 0.18s;
}
.item-card:hover{border-color:var(--acc)}
.item-med:hover{border-color:var(--green)}
.item-emoji{font-size:1.8rem}
.item-name{font-size:0.8rem;font-weight:600;color:var(--text)}
.item-desc{font-size:0.65rem;color:var(--dim);line-height:1.5}
.item-price{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--acc2);font-weight:600}

/* ── GIZMED HEADER ──────────────────────────────────────────────────────── */
.gizmed-header{
  display:flex;align-items:center;gap:14px;
  background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);
  border-radius:var(--r);padding:16px;margin-bottom:16px;
}
.gizmed-logo{font-size:2rem}
.gizmed-title{font-size:1rem;font-weight:700;color:var(--text)}
.gizmed-sub{font-size:0.65rem;color:var(--dim);margin-top:2px}

/* ── ALERTS ──────────────────────────────────────────────────────────────── */
.alert-card{
  border-radius:var(--r);padding:12px 14px;margin-bottom:8px;
  border:1px solid var(--b1);background:var(--bg2);
}
.al-info{border-right:3px solid var(--acc)}
.al-warning{border-right:3px solid var(--yellow)}
.al-critical{border-right:3px solid var(--red)}
.al-read{opacity:0.45}
.al-header{display:flex;justify-content:space-between;margin-bottom:7px}
.al-from{font-size:0.72rem;font-weight:600;color:var(--text)}
.al-date{font-size:0.6rem;color:var(--dim)}
.al-msg{font-size:0.82rem;color:var(--text);line-height:1.6;margin-bottom:8px}

/* ── TASKS ──────────────────────────────────────────────────────────────── */
.tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.task-card{
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:var(--r);padding:12px;
  display:flex;flex-direction:column;gap:6px;
  transition:border-color 0.18s;
}
.task-card:hover{border-color:var(--b2)}
.tc-done{opacity:0.4}
.tc-header{display:flex;justify-content:space-between;align-items:center}
.tc-badge{padding:2px 7px;border-radius:4px;font-size:0.6rem;font-weight:700;font-family:'DM Mono',monospace}
.tp-high{background:rgba(239,68,68,0.15);color:var(--red)}
.tp-medium{background:rgba(234,179,8,0.12);color:var(--yellow)}
.tp-low{background:rgba(34,197,94,0.12);color:var(--green)}
.tc-id{font-size:0.55rem;color:var(--dim2);font-family:'DM Mono',monospace}
.tc-title{font-size:0.82rem;font-weight:600;color:var(--text);line-height:1.4}
.tc-desc{font-size:0.7rem;color:var(--dim);line-height:1.5}
.tc-footer{display:flex;justify-content:space-between;align-items:center}
.tc-ass{font-size:0.65rem;color:var(--dim)}
.tc-status{font-size:0.62rem}
.ts-done{color:var(--green)}
.ts-pending{color:var(--dim2)}
.ts-in_progress{color:var(--yellow)}
.tc-actions{display:flex;gap:6px}

/* ── TOHU ──────────────────────────────────────────────────────────────── */
.tohu-wrap{max-width:560px}
.tohu-active-card{
  border:1px solid;border-radius:var(--r);padding:20px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:10px;margin-bottom:16px;
}
.ta-badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;flex-shrink:0}
.ta-title{font-size:1.1rem;font-weight:700;letter-spacing:0.05em}
.ta-desc{font-size:0.8rem;color:var(--dim);line-height:1.7}
.ta-by{font-size:0.65rem;color:var(--dim2)}
.tohu-idle{}
.tohu-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;margin-top:10px}
.tohu-card{
  border:1px solid var(--tc,var(--b1));
  border-radius:var(--r2);padding:12px 6px;
  text-align:center;cursor:pointer;transition:all 0.18s;
  color:var(--tc,var(--dim));
}
.tohu-card:hover,.tohu-card.tc-sel{
  background:rgba(from var(--tc) r g b / 0.12);
  box-shadow:0 0 12px var(--tc);
}
.tc-num{font-size:1.5rem;font-weight:700;font-family:'DM Mono',monospace}
.tc-lname{font-size:0.55rem;letter-spacing:0.05em;margin-top:3px;opacity:0.85}
.tohu-desc{
  border:1px solid var(--b1);border-radius:var(--r2);
  padding:12px;min-height:64px;
  font-size:0.78rem;color:var(--dim);line-height:1.7;
  margin-bottom:12px;background:var(--bg2);
}

/* ── COUNCIL ─────────────────────────────────────────────────────────────── */
.council-header{
  display:flex;align-items:center;gap:14px;
  background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.2);
  border-radius:var(--r);padding:16px;margin-bottom:16px;
}
.council-emblem{font-size:2rem}
.council-title{font-size:1rem;font-weight:700;color:var(--text)}
.council-sub{font-size:0.65rem;color:var(--dim);margin-top:2px}
.council-body{font-size:0.84rem;color:var(--dim);line-height:1.8;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px}

/* ── G-PASS ───────────────────────────────────────────────────────────────── */
.gpass-header{
  display:flex;align-items:center;gap:14px;
  background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.2);
  border-radius:var(--r);padding:16px;margin-bottom:16px;
}
.gpass-badge{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#ca8a04,#92400e);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:900;color:#fff;font-family:'DM Mono',monospace;
  box-shadow:0 0 16px rgba(234,179,8,0.3);
}
.gpass-title{font-size:0.95rem;font-weight:700;color:var(--text)}
.gpass-sub{font-size:0.65rem;color:var(--dim);margin-top:2px}
.gpass-card{
  background:linear-gradient(135deg,rgba(234,179,8,0.06),rgba(146,64,14,0.04));
  border:1px solid rgba(234,179,8,0.2);border-radius:var(--r);
  padding:14px;margin-bottom:8px;
}
.gpass-card-header{display:flex;justify-content:space-between;margin-bottom:8px}
.gpass-card-id{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--yellow);font-weight:600}
.gpass-card-date{font-size:0.6rem;color:var(--dim)}
.gpass-card-name{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:4px}
.gpass-card-ded{font-size:0.75rem;color:var(--dim);line-height:1.6;margin-bottom:10px}
.gpass-card-footer{display:flex;justify-content:space-between;align-items:center}
.gpass-seal{
  font-size:0.62rem;color:var(--yellow);
  background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.25);
  padding:2px 8px;border-radius:12px;font-weight:600;
}

/* ── NOTIFY ──────────────────────────────────────────────────────────────── */
.notify{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  padding:9px 20px;border-radius:24px;
  font-size:0.78rem;font-weight:500;
  background:var(--bg2);border:1px solid var(--b1);
  color:var(--text);z-index:9999;
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),opacity 0.28s;
  opacity:0;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.notify.show{transform:translateX(-50%) translateY(0);opacity:1}
.n-success{border-color:var(--green);color:var(--green)}
.n-error{border-color:var(--red);color:var(--red)}
.n-info{border-color:var(--acc);color:var(--acc2)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-emblem">
      <div class="ring">🦅</div>
      <div class="login-title">GIZBALLAH</div>
      <div class="login-sub">SECURE AGENT PORTAL v3.1</div>
    </div>
    <label class="login-label" for="loginId">// מספר סוכן</label>
    <input type="text" id="loginId" class="login-inp" placeholder="00000" maxlength="10" autocomplete="off">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">כניסה למערכת</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-secure"><span class="lock-icon">🔒</span> AES-256 ENCRYPTED · BIOMETRIC VERIFIED</div>
  </div>
</div>

<!-- BOOT -->
<div id="bootWrap">
  <div id="bootLines"></div>
  <div class="boot-bar"><div class="boot-bar-fill"></div></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="header">
    <div class="hdr-avatar" id="hdrEmoji">🦅</div>
    <div>
      <div class="hdr-name" id="hdrName"></div>
      <div class="hdr-rank" id="hdrRank"></div>
      <div class="hdr-id" id="hdrId"></div>
    </div>
    <div class="hdr-right">
      <div class="verified-badge"><span class="verified-dot"></span>VERIFIED</div>
      <button class="logout-btn" onclick="logout()">יציאה</button>
    </div>
  </div>

  <div id="tohuBar"></div>

  <div class="tab-nav">
    <button class="tab-btn" id="tabBank"    data-tab="bank"    onclick="switchTab('bank')">   <span class="tab-icon">🏦</span>בנק</button>
    <button class="tab-btn" id="tabShop"    data-tab="shop"    onclick="switchTab('shop')">   <span class="tab-icon">🛒</span>חנות</button>
    <button class="tab-btn" id="tabGizmed"  data-tab="gizmed"  onclick="switchTab('gizmed')"> <span class="tab-icon">⚕️</span>גיזמדא</button>
    <button class="tab-btn" id="tabAlerts"  data-tab="alerts"  onclick="switchTab('alerts')"> <span class="tab-icon">🔔</span>התראות<span class="alert-badge" id="alertBadge"></span></button>
    <button class="tab-btn" id="tabTasks"   data-tab="tasks"   onclick="switchTab('tasks')">  <span class="tab-icon">📋</span>משימות</button>
    <button class="tab-btn" id="tabTohu"    data-tab="tohu"    onclick="switchTab('tohu')">   <span class="tab-icon">⚠️</span>קוד תוהו</button>
    <button class="tab-btn" id="tabCouncil" data-tab="council" onclick="switchTab('council')"><span class="tab-icon">🦅</span>מועצת הנץ</button>
    <button class="tab-btn" id="tabGpass"   data-tab="gpass"   onclick="switchTab('gpass')">  <span class="tab-icon">🏅</span>G-PASS</button>
  </div>

  <div class="content">
    <div class="tab-pane" id="pane-bank">    <div id="bankContent"></div></div>
    <div class="tab-pane" id="pane-shop">    <div id="shopContent"></div></div>
    <div class="tab-pane" id="pane-gizmed">  <div id="gizmedContent"></div></div>
    <div class="tab-pane" id="pane-alerts">  <div id="alertsContent"></div></div>
    <div class="tab-pane" id="pane-tasks">   <div id="tasksContent"></div></div>
    <div class="tab-pane" id="pane-tohu">    <div id="tohuContent"></div></div>
    <div class="tab-pane" id="pane-council"> <div id="councilContent"></div></div>
    <div class="tab-pane" id="pane-gpass">   <div id="gpassContent"></div></div>
  </div>
</div>

<div class="notify" id="notify"></div>
</body>
</html>
