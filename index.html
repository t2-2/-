<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אדריאנה - יום הולדת 15</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700;900&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://birthday-6795f-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const guestsRef = ref(db, 'guests');

        window.sendRSVP = function() {
            const input = document.getElementById('guestName');
            if (input.value.trim()) {
                push(guestsRef, { name: input.value.trim(), timestamp: Date.now() });
                input.value = '';
                input.placeholder = "נתראה שם!";
            }
        };

        onValue(guestsRef, (snapshot) => {
            const list = document.getElementById('guestList');
            const counter = document.getElementById('mainCounter');
            list.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                const guests = Object.values(data);
                counter.innerText = guests.length;
                guests.reverse().forEach(g => {
                    const div = document.createElement('div');
                    div.className = 'driver-chip';
                    div.innerHTML = `<span class="dot"></span> ${g.name}`;
                    list.appendChild(div);
                });
            }
        });
    </script>

    <style>
        :root {
            --accent: #ff1801;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Rubik', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.4;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.pinimg.com/1200x/69/ef/10/69ef10391be55dd02e4ec2c446360148.jpg') no-repeat center center;
            background-size: cover;
            z-index: -2;
            filter: brightness(0.3) contrast(1.1);
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 60px 24px;
            position: relative;
        }

        header {
            margin-bottom: 50px;
        }

        .top-tag {
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
        }

        h1 {
            font-size: 4.5rem; /* הגדלת הפונט */
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            letter-spacing: -3px;
            text-transform: uppercase;
            /* אפקט מגניב לכותרת: מילוי שקוף עם מסגרת דקה */
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
            color: white;
        }

        .info-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .info-card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 24px;
        }

        .info-card label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 6px;
        }

        .info-card span {
            font-size: 1rem;
            font-weight: 700;
        }

        .action-area {
            margin-bottom: 60px;
        }

        .input-box {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            background: transparent;
            border: none;
            padding: 18px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            text-align: right;
            font-family: 'Rubik', sans-serif;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Rubik', sans-serif;
        }

        button:active { transform: scale(0.97); }

        .list-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 25px;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .list-header h2 { font-size: 0.9rem; margin: 0; color: #666; }
        .count-badge {
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
        }

        #guestList {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .driver-chip {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 14px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .dot {
            width: 5px; height: 5px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: 10px;
        }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <header>
            <span class="top-tag">הזמנה רשמית</span>
            <h1>אדריאנה<br>בת 15</h1>
        </header>

        <div class="info-grid">
            <div class="info-card">
                <label>איפה</label>
                <span>קארטינג ירושלים</span>
            </div>
            <div class="info-card">
                <label>מתי</label>
                <span>ראשון 22.3 | 18:00</span>
            </div>
        </div>

        <div class="action-area">
            <div class="input-box">
                <input type="text" id="guestName" placeholder="הקלידו שם מלא...">
                <button onclick="sendRSVP()">אישור הגעה</button>
            </div>
        </div>

        <div class="list-section">
            <div class="list-header">
                <h2>נהגים על המסלול</h2>
                <div class="count-badge" id="mainCounter">0</div>
            </div>
            <div id="guestList"></div>
        </div>
    </div>

</body>
</html>
