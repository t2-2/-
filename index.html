<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIZBALLAH — CLASSIFIED SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, updateDoc, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyDwqyVuef-pZT5WOpBgiH4xjB7WekLsDGc",
  authDomain:"falcon-d5f48.firebaseapp.com",
  projectId:"falcon-d5f48",
  storageBucket:"falcon-d5f48.firebasestorage.app",
  messagingSenderId:"958990827013",
  appId:"1:958990827013:web:e14eaa25a96239cdb2a66c"
};
const app = initializeApp(FB);
const db  = getFirestore(app);

// ── AGENT REGISTRY ─────────────────────────────────────────────────────────
const AGENTS = {
  "00002": { name:"הנץ השוקט",       codename:"הנץ השוקט",     rank:"נשיא",  rankCode:"PRESIDENT", salary:4000000000000000, emoji:"👑" },
  "62828": { name:"היואל האימתני",   codename:"היואל האימתני", rank:"אל\"ג", rankCode:"ALG",       salary:2000000000000000, emoji:"⚔️" },
  "67246": { name:"לולי (המלקט)",    codename:"המלקט",          rank:"מפ\"ע", rankCode:"MAFAE",     salary:1400000000000000, emoji:"🔧" },
  "83412": { name:"דרורי",           codename:"דרורי",          rank:"מזכ\"ל",rankCode:"MAZKAL",    salary:600000000000,     emoji:"📋" },
  "74631": { name:"יהלי מועלם",      codename:"יהלי מועלם",    rank:"סמז\"כ",rankCode:"SAMZAK",    salary:300000000000,     emoji:"🎖️" },
  "54768": { name:"אדריאנה",         codename:"אדריאנה",        rank:"מגוייס",rankCode:"RECRUIT",   salary:0,               emoji:"🔄" },
};

const TOHU_LEVELS = {
  1:{ name:"תוהו 1", color:"#39ff14", desc:"אירוע נקודתי — כשל במערך יחידה אחת. סמכויות זמניות ליחידה, פקודות עצמאיות." },
  2:{ name:"תוהו 2", color:"#ffcc00", desc:"אובדן שליטה חלקי בכמה יחידות. הפעלת פקודות סותרות, דרגים נמוכים מקבלים סמכות זמנית." },
  3:{ name:"תוהו 3", color:"#ff8800", desc:"חדירה מסוכנת או חשיפה של מידע מסווג. ניתוק תלות, כל יחידה פועלת באופן עצמאי." },
  4:{ name:"תוהו 4", color:"#ff4400", desc:"כשל מערכתי רחב בארגון. היפוך היררכיה זמני, פקודות סותרות תקפות במקביל." },
  5:{ name:"תוהו 5", color:"#ff0000", desc:"מצב חירום כולל — איום קיומי. כל הדרגים כפופים רק לנשיא/בולוק. יישום מרבי של כאוס מבוקר." },
};

// ── STATE ──────────────────────────────────────────────────────────────────
let currentAgent = null;
let tohuState    = null; // {active, level, activatedAt, activatedBy}
let tasks        = [];
let unsubTohu    = null;
let unsubTasks   = null;

// ── INIT ───────────────────────────────────────────────────────────────────
async function initFirestore() {
  // Seed agents if not exist
  for (const [id, data] of Object.entries(AGENTS)) {
    const ref = doc(db, 'agents', id);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, { ...data, agentId: id });
    }
  }
  // Init tohu doc if not exist
  const tohuRef = doc(db, 'system', 'tohu');
  const tohuSnap = await getDoc(tohuRef);
  if (!tohuSnap.exists()) {
    await setDoc(tohuRef, { active: false, level: 0, activatedAt: null, activatedBy: null });
  }
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
window.doLogin = async function() {
  const id = document.getElementById('agentIdInput').value.trim();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'מאמת...';

  if (!AGENTS[id]) {
    showLoginError('// גישה נדחית — מספר סוכן לא מזוהה');
    btn.disabled = false;
    btn.textContent = 'כניסה';
    return;
  }

  // Load agent from firestore (may have updated salary)
  const snap = await getDoc(doc(db, 'agents', id));
  currentAgent = snap.exists() ? { ...AGENTS[id], ...snap.data(), agentId: id } : { ...AGENTS[id], agentId: id };

  // Boot sequence
  await bootSequence();
  showDashboard();
};

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 3000);
}

async function bootSequence() {
  const lines = [
    '> INITIALIZING GIZBALLAH SECURE TERMINAL...',
    `> AGENT VERIFIED: ${currentAgent.agentId} — ${currentAgent.codename}`,
    `> CLEARANCE LEVEL: ${currentAgent.rank}`,
    '> LOADING ENCRYPTED MODULES...',
    '> ESTABLISHING SECURE CHANNEL...',
    '> ACCESS GRANTED ██████████ 100%',
  ];
  const el = document.getElementById('bootLog');
  el.innerHTML = '';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('bootScreen').style.display = 'flex';

  for (const line of lines) {
    await sleep(280);
    el.innerHTML += line + '\n';
  }
  await sleep(600);
  document.getElementById('bootScreen').style.display = 'none';
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('dashboard').style.display = 'flex';
  renderAgentHeader();
  renderSalaryCard();
  loadTohuState();
  loadTasks();

  const isPresident = currentAgent.rankCode === 'PRESIDENT';
  const isALG       = currentAgent.rankCode === 'ALG';

  document.getElementById('tohuPanel').style.display    = isPresident ? 'block' : 'none';
  document.getElementById('salaryMgmtPanel').style.display = isPresident ? 'block' : 'none';
  document.getElementById('addTaskPanel').style.display = (isPresident || isALG) ? 'block' : 'none';

  if (isPresident) renderSalaryMgmt();
  renderTohuBanner();
}

function renderAgentHeader() {
  document.getElementById('agentName').textContent    = currentAgent.codename;
  document.getElementById('agentRank').textContent    = currentAgent.rank;
  document.getElementById('agentId').textContent      = currentAgent.agentId;
  document.getElementById('agentEmoji').textContent   = currentAgent.emoji;
}

function renderSalaryCard() {
  document.getElementById('salaryAmount').textContent = formatSalary(currentAgent.salary);
}

function formatSalary(n) {
  const num = Number(n);
  if (num >= 1e15) return (num/1e15).toFixed(1) + ' קודריליון BTC';
  if (num >= 1e12) return (num/1e12).toFixed(1) + ' טריליון BTC';
  if (num >= 1e9)  return (num/1e9).toFixed(1)  + ' מיליארד BTC';
  if (num >= 1e6)  return (num/1e6).toFixed(1)  + ' מיליון BTC';
  return num.toLocaleString() + ' BTC';
}

// ── TOHU STATE ─────────────────────────────────────────────────────────────
function loadTohuState() {
  if (unsubTohu) unsubTohu();
  unsubTohu = onSnapshot(doc(db, 'system', 'tohu'), snap => {
    tohuState = snap.data();
    renderTohuBanner();
    renderTohuPanel();
  });
}

function renderTohuBanner() {
  const banner = document.getElementById('tohuBanner');
  if (!tohuState || !tohuState.active) {
    banner.style.display = 'none';
    document.body.classList.remove('tohu-active');
    return;
  }
  const lvl = TOHU_LEVELS[tohuState.level];
  banner.style.display = 'flex';
  banner.style.borderColor = lvl.color;
  banner.style.color = lvl.color;
  banner.innerHTML = `⚠ קוד תוהו ${tohuState.level} פעיל — ${lvl.name} ⚠`;
  document.body.classList.add('tohu-active');
  document.body.style.setProperty('--tohu-color', lvl.color);
}

function renderTohuPanel() {
  if (currentAgent.rankCode !== 'PRESIDENT') return;
  const panel = document.getElementById('tohuControls');

  if (tohuState && tohuState.active) {
    const lvl = TOHU_LEVELS[tohuState.level];
    panel.innerHTML = `
      <div class="tohu-active-info" style="border-color:${lvl.color};color:${lvl.color}">
        <div class="tohu-active-title">⚠ ${lvl.name} פעיל</div>
        <div class="tohu-active-desc">${lvl.desc}</div>
        <div class="tohu-active-meta">הופעל על ידי: ${tohuState.activatedBy || '—'}</div>
      </div>
      <button class="btn btn-deactivate" onclick="deactivateTohu()">■ כבה קוד תוהו</button>`;
  } else {
    panel.innerHTML = `
      <div class="tohu-select-row">
        <label class="field-label">בחר רמת תוהו:</label>
        <div class="tohu-level-grid">
          ${Object.entries(TOHU_LEVELS).map(([lvl, data]) => `
            <div class="tohu-level-card" data-level="${lvl}" onclick="selectTohuLevel(${lvl})" style="--tc:${data.color}">
              <div class="tlc-num">${lvl}</div>
              <div class="tlc-name">${data.name}</div>
            </div>`).join('')}
        </div>
      </div>
      <div id="tohuLevelDesc" class="tohu-desc-box"></div>
      <button class="btn btn-activate" id="activateTohuBtn" onclick="activateTohu()" disabled>▶ הפעל קוד תוהו</button>`;
  }
}

let selectedTohuLevel = null;
window.selectTohuLevel = function(lvl) {
  selectedTohuLevel = lvl;
  document.querySelectorAll('.tohu-level-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.tohu-level-card[data-level="${lvl}"]`)?.classList.add('selected');
  const desc = TOHU_LEVELS[lvl];
  document.getElementById('tohuLevelDesc').innerHTML = `
    <div style="color:${desc.color};font-weight:700;margin-bottom:6px">${desc.name}</div>
    <div style="color:#aaa;font-size:0.82rem;line-height:1.7">${desc.desc}</div>`;
  document.getElementById('activateTohuBtn').disabled = false;
};

window.activateTohu = async function() {
  if (!selectedTohuLevel) return;
  if (!confirm(`אשר הפעלת קוד תוהו ${selectedTohuLevel}?`)) return;
  await updateDoc(doc(db,'system','tohu'), {
    active: true, level: selectedTohuLevel,
    activatedAt: serverTimestamp(), activatedBy: currentAgent.codename
  });
  log(`קוד תוהו ${selectedTohuLevel} הופעל`);
};

window.deactivateTohu = async function() {
  if (!confirm('אשר כיבוי קוד תוהו?')) return;
  await updateDoc(doc(db,'system','tohu'), {
    active:false, level:0, activatedAt:null, activatedBy:null
  });
  selectedTohuLevel = null;
  log('קוד תוהו כובה');
};

// ── SALARY MANAGEMENT ──────────────────────────────────────────────────────
function renderSalaryMgmt() {
  const container = document.getElementById('salaryList');
  container.innerHTML = Object.entries(AGENTS).map(([id, ag]) => `
    <div class="salary-row">
      <span class="salary-agent">${ag.emoji} ${ag.codename} <span class="salary-rank">(${ag.rank})</span></span>
      <div class="salary-edit-row">
        <input type="text" class="salary-input" id="sal_${id}" value="${formatSalary(ag.salary)}" placeholder="סכום חדש">
        <button class="btn btn-sm" onclick="saveSalary('${id}')">שמור</button>
      </div>
    </div>`).join('');
}

window.saveSalary = async function(agentId) {
  const inp = document.getElementById('sal_'+agentId);
  const raw = inp.value.replace(/[^\d.]/g,'');
  const num = parseFloat(raw);
  if (isNaN(num)) { log('ערך לא תקין'); return; }
  await updateDoc(doc(db,'agents',agentId), { salary: num });
  AGENTS[agentId].salary = num;
  if (currentAgent.agentId === agentId) {
    currentAgent.salary = num;
    renderSalaryCard();
  }
  log(`משכורת ${AGENTS[agentId].codename} עודכנה`);
  inp.style.borderColor = '#39ff14';
  setTimeout(() => inp.style.borderColor = '', 1500);
};

// ── TASKS ──────────────────────────────────────────────────────────────────
function loadTasks() {
  if (unsubTasks) unsubTasks();
  const q = query(collection(db,'tasks'), orderBy('createdAt','desc'));
  unsubTasks = onSnapshot(q, snap => {
    tasks = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderTasks();
  });

  // Populate assignee selector
  const sel = document.getElementById('taskAssignee');
  if (sel) {
    sel.innerHTML = '<option value="">— בחר סוכן —</option>'
      + Object.entries(AGENTS).map(([id,ag]) =>
        `<option value="${id}">${ag.emoji} ${ag.codename} (${ag.rank})</option>`
      ).join('');
  }
}

function renderTasks() {
  const container = document.getElementById('tasksList');
  const myTasks   = currentAgent.rankCode === 'PRESIDENT' || currentAgent.rankCode === 'ALG'
    ? tasks
    : tasks.filter(t => t.assigneeId === currentAgent.agentId);

  if (!myTasks.length) {
    container.innerHTML = '<div class="empty-msg">// אין משימות פעילות</div>';
    return;
  }

  container.innerHTML = myTasks.map(t => {
    const assignee = AGENTS[t.assigneeId];
    const canDelete = currentAgent.rankCode === 'PRESIDENT' || currentAgent.rankCode === 'ALG';
    const isAssigned = t.assigneeId === currentAgent.agentId;
    return `
    <div class="task-card ${t.status==='done'?'task-done':''}">
      <div class="task-header">
        <span class="task-priority p-${t.priority||'medium'}">${priorityLabel(t.priority)}</span>
        <span class="task-id">#${t.id.slice(-4).toUpperCase()}</span>
      </div>
      <div class="task-title">${esc(t.title)}</div>
      ${t.description ? `<div class="task-desc">${esc(t.description)}</div>` : ''}
      <div class="task-footer">
        <span class="task-assignee">${assignee?.emoji||'?'} ${assignee?.codename||t.assigneeId}</span>
        <span class="task-status s-${t.status}">${statusLabel(t.status)}</span>
      </div>
      <div class="task-actions">
        ${isAssigned && t.status!=='done' ? `<button class="btn btn-sm btn-done" onclick="completeTask('${t.id}')">✓ סיים</button>` : ''}
        ${canDelete ? `<button class="btn btn-sm btn-del" onclick="deleteTask('${t.id}')">✕</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function priorityLabel(p) {
  return p === 'high' ? '🔴 גבוה' : p === 'low' ? '🟢 נמוך' : '🟡 בינוני';
}
function statusLabel(s) {
  return s === 'done' ? '✓ הושלם' : s === 'in_progress' ? '⟳ בביצוע' : '○ ממתין';
}

window.addTask = async function() {
  const title    = document.getElementById('taskTitle').value.trim();
  const desc     = document.getElementById('taskDesc').value.trim();
  const assignee = document.getElementById('taskAssignee').value;
  const priority = document.getElementById('taskPriority').value;
  if (!title || !assignee) { log('נא למלא כותרת וסוכן'); return; }

  await addDoc(collection(db,'tasks'), {
    title, description:desc, assigneeId:assignee, priority,
    status:'pending', createdBy:currentAgent.agentId, createdAt:serverTimestamp()
  });
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value  = '';
  document.getElementById('taskAssignee').value = '';
  log('משימה נוספה');
};

window.completeTask = async function(id) {
  await updateDoc(doc(db,'tasks',id), { status:'done' });
  log('משימה הושלמה');
};

window.deleteTask = async function(id) {
  await deleteDoc(doc(db,'tasks',id));
  log('משימה נמחקה');
};

// ── LOG ────────────────────────────────────────────────────────────────────
function log(msg) {
  const el = document.getElementById('sysLog');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.textContent = `[${new Date().toLocaleTimeString('he-IL')}] > ${msg}`;
  el.prepend(line);
  if (el.children.length > 20) el.lastChild.remove();
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

window.logout = function() {
  currentAgent = null;
  if (unsubTohu)  unsubTohu();
  if (unsubTasks) unsubTasks();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('agentIdInput').value = '';
  document.body.classList.remove('tohu-active');
};

// ── KEYBOARD ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
    window.doLogin();
  }
});

// ── BOOT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await initFirestore();
});
</script>

<style>
:root {
  --green: #39ff14;
  --green-dim: rgba(57,255,20,0.15);
  --green-glow: rgba(57,255,20,0.06);
  --dark: #040a04;
  --dark2: #070f07;
  --dark3: #0a160a;
  --border: rgba(57,255,20,0.2);
  --text: #c8e8c8;
  --dim: #4a6a4a;
  --red: #ff3030;
  --yellow: #ffcc00;
  --orange: #ff8800;
  --tohu-color: #39ff14;
  --r: 4px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* CRT effect */
body {
  font-family: 'Share Tech Mono', monospace;
  background: var(--dark);
  color: var(--green);
  min-height: 100vh;
  direction: rtl;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content:'';
  position:fixed;inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events:none;z-index:9999;
}
body::after {
  content:'';
  position:fixed;inset:0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
  pointer-events:none;z-index:9998;
}

/* TOHU active pulse */
body.tohu-active {
  animation: tohuPulse 2s ease-in-out infinite;
}
@keyframes tohuPulse {
  0%,100% { box-shadow: inset 0 0 0px transparent; }
  50%      { box-shadow: inset 0 0 30px rgba(255,0,0,0.1); }
}

/* ── LOGIN SCREEN ───────────────────────────────────────────────────────── */
#loginScreen {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
  position:relative;
  z-index:1;
}
.login-box {
  width:100%;max-width:440px;
  border:1px solid var(--border);
  background:var(--dark2);
  padding:40px 36px;
  box-shadow:0 0 40px rgba(57,255,20,0.08), inset 0 0 20px rgba(57,255,20,0.02);
  position:relative;
}
.login-box::before {
  content:'TOP SECRET // CLASSIFIED';
  position:absolute;top:-10px;right:16px;
  font-size:0.55rem;letter-spacing:0.25em;
  color:var(--red);
  background:var(--dark);
  padding:0 8px;
}
.login-logo {
  text-align:center;
  margin-bottom:32px;
}
.login-logo .logo-badge {
  width:64px;height:64px;
  border:2px solid var(--green);
  border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:1.8rem;
  box-shadow:0 0 20px rgba(57,255,20,0.3);
  animation:logoPulse 3s ease-in-out infinite;
  margin-bottom:12px;
}
@keyframes logoPulse {
  0%,100%{box-shadow:0 0 20px rgba(57,255,20,0.3)}
  50%{box-shadow:0 0 40px rgba(57,255,20,0.6)}
}
.login-logo .org-name {
  display:block;font-size:1.1rem;letter-spacing:0.2em;
  text-shadow:0 0 12px var(--green);
}
.login-logo .org-sub {
  display:block;font-size:0.6rem;color:var(--dim);letter-spacing:0.3em;margin-top:4px;
}
.field-label {
  display:block;font-size:0.65rem;letter-spacing:0.2em;color:var(--dim);margin-bottom:6px;
}
.login-input {
  width:100%;padding:10px 14px;
  background:var(--dark3);
  border:1px solid var(--border);
  color:var(--green);
  font-family:'Share Tech Mono',monospace;font-size:1rem;
  direction:ltr;letter-spacing:0.2em;text-align:center;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.login-input:focus {
  outline:none;
  border-color:var(--green);
  box-shadow:0 0 12px rgba(57,255,20,0.2);
}
.login-input::placeholder{color:var(--dim)}
.login-btn {
  width:100%;margin-top:16px;padding:12px;
  background:transparent;border:1px solid var(--green);
  color:var(--green);font-family:'Share Tech Mono',monospace;
  font-size:0.85rem;letter-spacing:0.2em;cursor:pointer;
  transition:all 0.2s;
}
.login-btn:hover{background:var(--green-dim);box-shadow:0 0 16px rgba(57,255,20,0.2)}
.login-btn:disabled{opacity:0.4;cursor:not-allowed}
.login-error {
  margin-top:12px;font-size:0.7rem;color:var(--red);
  text-align:center;opacity:0;transition:opacity 0.3s;
  letter-spacing:0.1em;
}

/* ── BOOT SCREEN ────────────────────────────────────────────────────────── */
#bootScreen {
  display:none;
  position:fixed;inset:0;
  background:var(--dark);
  z-index:100;
  align-items:center;justify-content:center;
  flex-direction:column;
  padding:40px;
}
#bootLog {
  font-size:0.8rem;letter-spacing:0.05em;
  white-space:pre-line;line-height:2;
  text-shadow:0 0 8px var(--green);
  max-width:600px;width:100%;
}
.boot-cursor {
  display:inline-block;width:10px;height:1.1em;
  background:var(--green);
  animation:blink 0.7s steps(1) infinite;
  vertical-align:bottom;margin-right:4px;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── DASHBOARD ──────────────────────────────────────────────────────────── */
#dashboard {
  display:none;
  flex-direction:column;
  min-height:100vh;
  position:relative;z-index:1;
}

/* TOP BAR */
.topbar {
  padding:10px 20px;
  border-bottom:1px solid var(--border);
  background:var(--dark2);
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
  position:sticky;top:0;z-index:50;
}
.tb-badge {
  width:32px;height:32px;
  border:1px solid var(--green);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
  box-shadow:0 0 8px rgba(57,255,20,0.2);
}
.tb-name { font-size:0.9rem;color:var(--green);letter-spacing:0.08em; }
.tb-rank { font-size:0.6rem;color:var(--dim);letter-spacing:0.15em;margin-top:1px; }
.tb-id   { font-size:0.55rem;color:var(--dim);letter-spacing:0.1em; }
.tb-right{ margin-right:auto;display:flex;align-items:center;gap:12px; }
.logout-btn {
  padding:4px 12px;background:transparent;border:1px solid var(--dim);
  color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:0.65rem;
  cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;
}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* TOHU BANNER */
.tohu-banner {
  display:none;
  padding:8px 20px;
  border-bottom:2px solid;
  font-size:0.75rem;letter-spacing:0.3em;
  text-align:center;
  animation:tohuFlash 1s steps(1) infinite;
}
@keyframes tohuFlash{0%,100%{opacity:1}50%{opacity:0.5}}

/* LAYOUT */
.dash-body {
  flex:1;display:grid;
  grid-template-columns:280px 1fr 260px;
  gap:0;overflow:hidden;
  max-height:calc(100vh - 54px);
}
@media(max-width:900px){
  .dash-body{grid-template-columns:1fr;max-height:none;overflow:auto}
}

/* PANELS */
.panel {
  padding:16px;
  border-left:1px solid var(--border);
  overflow-y:auto;
  background:var(--dark2);
}
.panel:first-child{border-left:none}
.panel-title {
  font-size:0.62rem;letter-spacing:0.25em;color:var(--dim);
  margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.panel-title::before{content:'//';color:var(--green);opacity:0.5}

/* CARDS */
.info-card {
  border:1px solid var(--border);
  background:var(--green-glow);
  padding:14px 16px;
  margin-bottom:12px;
}
.info-card-label{font-size:0.58rem;letter-spacing:0.18em;color:var(--dim);margin-bottom:4px}
.info-card-value{font-size:1rem;color:var(--green);text-shadow:0 0 8px rgba(57,255,20,0.4)}
.info-card-value.salary{font-size:0.85rem}

/* BUTTONS */
.btn {
  padding:8px 16px;background:transparent;
  border:1px solid var(--green);color:var(--green);
  font-family:'Share Tech Mono',monospace;font-size:0.72rem;
  letter-spacing:0.08em;cursor:pointer;transition:all 0.18s;
}
.btn:hover{background:var(--green-dim);box-shadow:0 0 10px rgba(57,255,20,0.2)}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:0.65rem}
.btn-activate{
  width:100%;margin-top:12px;padding:10px;
  border-color:#ff4400;color:#ff4400;letter-spacing:0.15em;
}
.btn-activate:hover{background:rgba(255,68,0,0.1);box-shadow:0 0 12px rgba(255,68,0,0.3)}
.btn-deactivate{
  width:100%;padding:10px;margin-top:12px;
  border-color:var(--dim);color:var(--dim);letter-spacing:0.12em;
}
.btn-deactivate:hover{border-color:var(--red);color:var(--red)}
.btn-done{border-color:#39ff14;color:#39ff14}
.btn-del{border-color:var(--red);color:var(--red)}
.btn-add{width:100%;margin-top:10px;letter-spacing:0.1em}

/* INPUTS */
.dash-input, .dash-select, .dash-textarea {
  width:100%;padding:7px 10px;
  background:var(--dark3);border:1px solid var(--border);
  color:var(--green);font-family:'Share Tech Mono',monospace;font-size:0.78rem;
  direction:rtl;transition:border-color 0.18s;margin-bottom:8px;
}
.dash-input:focus,.dash-select:focus,.dash-textarea:focus{
  outline:none;border-color:var(--green);box-shadow:0 0 8px rgba(57,255,20,0.15);
}
.dash-input::placeholder,.dash-textarea::placeholder{color:var(--dim)}
.dash-select option{background:var(--dark2);color:var(--green)}
.dash-textarea{resize:vertical;min-height:60px}

/* TOHU */
.tohu-level-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px;
}
.tohu-level-card{
  border:1px solid var(--tc,#39ff14);
  padding:8px 4px;text-align:center;cursor:pointer;
  transition:all 0.18s;
  color:var(--tc,#39ff14);
}
.tohu-level-card:hover,.tohu-level-card.selected{
  background:rgba(from var(--tc) r g b / 0.15);
  box-shadow:0 0 10px var(--tc);
}
.tlc-num{font-size:1.4rem;font-weight:700}
.tlc-name{font-size:0.55rem;letter-spacing:0.05em;opacity:0.8;margin-top:2px}
.tohu-desc-box{
  border:1px solid var(--border);padding:10px;margin-bottom:10px;
  font-size:0.75rem;min-height:60px;background:var(--green-glow);
}
.tohu-active-info{
  border:1px solid;padding:12px;margin-bottom:10px;
}
.tohu-active-title{font-size:0.9rem;letter-spacing:0.1em;margin-bottom:6px;animation:tohuFlash 1s steps(1) infinite}
.tohu-active-desc{font-size:0.72rem;opacity:0.8;line-height:1.6;margin-bottom:6px}
.tohu-active-meta{font-size:0.6rem;opacity:0.5}
.tohu-select-row{margin-bottom:8px}

/* SALARY */
.salary-row{
  border-bottom:1px solid var(--border);
  padding:10px 0;
}
.salary-agent{font-size:0.78rem;display:block;margin-bottom:6px}
.salary-rank{color:var(--dim);font-size:0.65rem}
.salary-edit-row{display:flex;gap:6px;align-items:center}
.salary-input{
  flex:1;padding:5px 8px;
  background:var(--dark3);border:1px solid var(--border);
  color:var(--green);font-family:'Share Tech Mono',monospace;font-size:0.72rem;
  direction:rtl;transition:border-color 0.3s;
}
.salary-input:focus{outline:none;border-color:var(--green)}

/* TASKS */
.task-card{
  border:1px solid var(--border);
  background:var(--green-glow);
  padding:10px;margin-bottom:8px;
  transition:border-color 0.18s;
}
.task-card:hover{border-color:rgba(57,255,20,0.4)}
.task-card.task-done{opacity:0.45}
.task-header{display:flex;justify-content:space-between;margin-bottom:6px}
.task-priority{font-size:0.6rem;letter-spacing:0.05em}
.task-id{font-size:0.55rem;color:var(--dim);font-family:'Share Tech Mono',monospace}
.task-title{font-size:0.82rem;margin-bottom:4px;line-height:1.4}
.task-desc{font-size:0.68rem;color:var(--dim);margin-bottom:6px;line-height:1.5}
.task-footer{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.task-assignee{font-size:0.65rem;color:var(--dim)}
.task-status{font-size:0.6rem}
.s-done{color:#39ff14}
.s-pending{color:var(--dim)}
.s-in_progress{color:var(--yellow)}
.task-actions{display:flex;gap:6px}

/* PRIORITY */
.p-high .task-priority,.p-high{color:var(--red)}
.p-medium{color:var(--yellow)}
.p-low{color:#39ff14}

/* LOG */
.sys-log{
  border-top:1px solid var(--border);
  background:var(--dark);
  padding:8px 14px;
  max-height:100px;overflow-y:auto;
  flex-shrink:0;
}
.log-line{font-size:0.62rem;color:var(--dim);line-height:1.8;letter-spacing:0.05em}
.sys-log::-webkit-scrollbar{width:2px}
.sys-log::-webkit-scrollbar-thumb{background:var(--border)}

.empty-msg{font-size:0.7rem;color:var(--dim);text-align:center;padding:20px;letter-spacing:0.1em}
.section-gap{margin-bottom:14px}
.scrollable{overflow-y:auto;max-height:calc(100vh - 120px);padding-right:2px}
.scrollable::-webkit-scrollbar{width:2px}
.scrollable::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-badge">🦅</div>
      <span class="org-name">GIZBALLAH</span>
      <span class="org-sub">SECURE AGENT TERMINAL // V2.4</span>
    </div>
    <label class="field-label" for="agentIdInput">// הזן מספר סוכן</label>
    <input type="text" id="agentIdInput" class="login-input" placeholder="00000" maxlength="10" autocomplete="off">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">[ כניסה למערכת ]</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── BOOT SCREEN ──────────────────────────────────────────────────────── -->
<div id="bootScreen">
  <div id="bootLog"></div>
  <span class="boot-cursor"></span>
</div>

<!-- ── DASHBOARD ────────────────────────────────────────────────────────── -->
<div id="dashboard">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tb-badge" id="agentEmoji">🦅</div>
    <div>
      <div class="tb-name" id="agentName"></div>
      <div class="tb-rank" id="agentRank"></div>
      <div class="tb-id">סוכן #<span id="agentId"></span></div>
    </div>
    <div class="tb-right">
      <button class="logout-btn" onclick="logout()">[ יציאה ]</button>
    </div>
  </div>

  <!-- TOHU BANNER -->
  <div class="tohu-banner" id="tohuBanner"></div>

  <!-- BODY -->
  <div class="dash-body">

    <!-- LEFT: Agent info + Tohu + Add Task -->
    <div class="panel scrollable">

      <!-- Salary card -->
      <div class="panel-title">פרופיל סוכן</div>
      <div class="info-card">
        <div class="info-card-label">// משכורת חודשית</div>
        <div class="info-card-value salary" id="salaryAmount">—</div>
      </div>

      <!-- TOHU PANEL (president only) -->
      <div id="tohuPanel" style="display:none">
        <div class="panel-title" style="margin-top:14px">קוד תוהו</div>
        <div id="tohuControls"></div>
      </div>

      <!-- ADD TASK (president + alg) -->
      <div id="addTaskPanel" style="display:none">
        <div class="panel-title" style="margin-top:14px">הוסף משימה</div>
        <input type="text" class="dash-input" id="taskTitle" placeholder="כותרת משימה">
        <textarea class="dash-textarea" id="taskDesc" placeholder="תיאור (אופציונלי)"></textarea>
        <select class="dash-select" id="taskAssignee">
          <option value="">— בחר סוכן —</option>
        </select>
        <select class="dash-select" id="taskPriority">
          <option value="high">🔴 עדיפות גבוהה</option>
          <option value="medium" selected>🟡 עדיפות בינונית</option>
          <option value="low">🟢 עדיפות נמוכה</option>
        </select>
        <button class="btn btn-add" onclick="addTask()">+ הוסף משימה</button>
      </div>

    </div>

    <!-- CENTER: Tasks -->
    <div class="panel scrollable">
      <div class="panel-title">משימות</div>
      <div id="tasksList">
        <div class="empty-msg">// טוען...</div>
      </div>
    </div>

    <!-- RIGHT: Salary management (president) -->
    <div class="panel scrollable">
      <div id="salaryMgmtPanel" style="display:none">
        <div class="panel-title">ניהול משכורות</div>
        <div id="salaryList"></div>
      </div>
      <div id="sysLogPanel">
        <div class="panel-title" style="margin-top:4px">לוג מערכת</div>
        <div class="sys-log" id="sysLog"></div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
